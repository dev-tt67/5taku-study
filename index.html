<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5択問題アプリ 安定版</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#222222">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#eef6fb;
  --card:#ffffff;
  --ink:#1f3349;
  --muted:#60758b;
  --primary:#2f80b7;
  --primary-dark:#23648f;
  --primary-soft:#dceff9;
  --accent:#5aa7d8;
  --success:#2f8f68;
  --danger:#c45b5b;
  --warning:#d79b35;
  --line:#d8e7f0;
  --shadow:0 8px 24px rgba(37, 92, 130, .12);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(90,167,216,.22), transparent 32%),
    linear-gradient(180deg,#f6fbff 0%,var(--bg) 100%);
  color:var(--ink);
}
header{
  background:linear-gradient(135deg,#2f80b7 0%,#4aa3cf 100%);
  color:#fff;
  padding:18px 16px;
  text-align:center;
  font-size:20px;
  font-weight:800;
  letter-spacing:.04em;
  box-shadow:0 4px 18px rgba(47,128,183,.22);
}
main{max-width:920px;margin:0 auto;padding:18px}
.card{
  background:rgba(255,255,255,.94);
  border:1px solid rgba(216,231,240,.9);
  border-radius:20px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(4px);
}
.tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:18px;
  background:rgba(255,255,255,.55);
  padding:8px;
  border:1px solid var(--line);
  border-radius:18px;
}
.tabs button{
  margin:0;
  background:transparent;
  color:var(--muted);
  box-shadow:none;
}
.tabs button.active{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;
  box-shadow:0 6px 14px rgba(47,128,183,.22);
}
button{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(47,128,183,.18);
  transition:transform .08s ease, box-shadow .08s ease, filter .08s ease;
}
button:hover{filter:brightness(1.03);box-shadow:0 9px 18px rgba(47,128,183,.22)}
button:active{transform:translateY(1px)}
button.secondary{
  background:#e7f2f8;
  color:var(--primary-dark);
  box-shadow:none;
  border:1px solid #cbe2ef;
}
button.danger,.danger{
  background:linear-gradient(135deg,#c45b5b,#d47979)!important;
  color:#fff!important;
}
button.mini,.mini{
  width:auto;
  padding:8px 12px;
  font-size:13px;
  margin:4px 4px 0 0;
  background:#eef6fb;
  color:var(--primary-dark);
  border:1px solid #cbe2ef;
  box-shadow:none;
}
input,select,textarea{
  width:100%;
  box-sizing:border-box;
  padding:12px 13px;
  margin:6px 0;
  border:1px solid #c8dce8;
  border-radius:14px;
  font-size:16px;
  background:#fbfdff;
  color:var(--ink);
  outline:none;
  transition:border-color .1s ease, box-shadow .1s ease, background .1s ease;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(90,167,216,.16);
  background:#fff;
}
textarea{min-height:86px;line-height:1.6}
label{
  font-size:13px;
  font-weight:800;
  color:#3b5b76;
  margin-top:10px;
  display:block;
}
h2{
  font-size:19px;
  margin:0 0 14px;
  color:#18324a;
  display:flex;
  align-items:center;
  gap:8px;
}
h2::before{
  content:"";
  width:7px;
  height:22px;
  border-radius:999px;
  background:linear-gradient(180deg,var(--primary),var(--accent));
  display:inline-block;
}
h3{font-size:16px;margin:16px 0 8px;color:#244762}
.hidden{display:none!important}
.small{color:var(--muted);font-size:13px;line-height:1.7}
.filters{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.filters3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:560px){
  main{padding:12px}
  .filters,.filters3{grid-template-columns:1fr}
  .tabs{grid-template-columns:repeat(2,1fr)}
}
.choice{
  display:block;
  width:100%;
  text-align:left;
  background:#fff;
  color:var(--ink);
  border:2px solid #d6e7f1;
  margin:10px 0;
  padding:15px;
  border-radius:16px;
  font-weight:700;
  line-height:1.55;
  box-shadow:0 3px 10px rgba(31,80,114,.06);
}
.choice.selected{
  border-color:var(--primary);
  background:#e7f4fb;
  box-shadow:0 0 0 4px rgba(47,128,183,.12);
}
.choice.correct{border-color:var(--success);background:#eaf8f2}
.choice.wrong{border-color:var(--danger);background:#fff0f0}
.badge{
  display:inline-block;
  padding:3px 9px;
  border-radius:999px;
  background:#e7f2f8;
  color:#2c5b7b;
  font-size:12px;
  font-weight:700;
  margin:2px;
}
.b-important{background:#fff1d9;color:#9a6414}
.b-subject{background:#dfeffa;color:#1d638d}
.explainBox{
  background:linear-gradient(180deg,#f8fcff,#f1f8fc);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin-top:12px;
}
.choiceExplain{
  border-top:1px solid var(--line);
  padding:10px 0;
}
.choiceExplain:first-child{border-top:none}
.result{
  font-weight:900;
  font-size:19px;
  margin-top:14px;
  color:var(--primary-dark);
}
.markBtns{
  display:flex;
  gap:8px;
  margin-top:8px;
}
.markBtns button{
  margin:0;
  padding:10px;
  background:#eef6fb;
  color:var(--primary-dark);
  border:1px solid #cbe2ef;
  box-shadow:none;
}
.markBtns button.selected{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;
  border-color:transparent;
  box-shadow:0 5px 12px rgba(47,128,183,.22);
}
.list-item{
  border-bottom:1px solid var(--line);
  padding:14px 0;
  font-size:14px;
  line-height:1.7;
}
.list-item:last-child{border-bottom:none}
#playArea{
  margin-top:18px;
  border-top:1px dashed #c7dfe9;
  padding-top:18px;
}
#metaTitle{
  background:#f0f8fd;
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
}
#leadText,#choiceTextOnly{
  background:#fff;
  border-left:5px solid var(--accent);
  border-radius:14px;
  padding:15px;
  line-height:1.7;
  box-shadow:0 3px 12px rgba(31,80,114,.07);
}

select[multiple]{
  min-height:140px;
  padding:8px;
}
select[multiple] option{padding:7px}

#importantBtn,
#inlineImportantBtn{
  transition:background .15s ease, color .15s ease, box-shadow .15s ease, border-color .15s ease;
}
#importantBtn.important-on,
#inlineImportantBtn.important-on{
  background:linear-gradient(135deg,#f2a93b,#f7c85f)!important;
  color:#4a3200!important;
  border-color:#f0b23c!important;
  box-shadow:0 6px 14px rgba(217,150,35,.28)!important;
}
#importantBtn.important-off,
#inlineImportantBtn.important-off{
  background:#e7f2f8!important;
  color:#23648f!important;
  border:1px solid #cbe2ef!important;
  box-shadow:none!important;
}

.importantChoiceBox{
  display:flex;
  align-items:flex-start;
  gap:8px;
  margin:10px 0;
}
.importantChoiceBox input{
  width:auto;
  margin-top:18px;
  transform:scale(1.25);
  accent-color:#f2a93b;
}
.importantChoiceBox .choice{
  margin:0;
}
.importantChoiceNote{
  color:#9a6414;
  font-size:12px;
  font-weight:800;
  margin-left:4px;
}

#filterMatchCount,#progressCount{
  font-weight:800;
  color:#23648f;
  background:#f0f8fd;
}

/* 解説欄の視認性改善 */
#explanation,
.explainBox{
  color:#1f3349 !important;
  font-size:16px !important;
  line-height:1.85 !important;
}

#explanation .small,
.explainBox .small{
  color:#2d4054 !important;
  font-size:15.5px !important;
  line-height:1.85 !important;
}

#explanation h3,
.explainBox h3{
  color:#18324a !important;
  font-size:17px !important;
  font-weight:900 !important;
  margin-top:18px !important;
  margin-bottom:10px !important;
}

.choiceExplain{
  color:#1f3349 !important;
  font-size:16px !important;
  line-height:1.8 !important;
  padding:13px 0 !important;
}

.choiceExplain b{
  color:#18324a !important;
  font-size:16.5px !important;
}

#choiceRecordArea{
  color:#1f3349 !important;
  font-size:15.5px !important;
}


/* 解説欄をさらに濃く・読みやすく */
#explanation,
.explainBox{
  color:#0f2235 !important;
}

#explanation .small,
.explainBox .small{
  color:#10283f !important;
}

.choiceExplain,
.choiceExplain .small{
  color:#10283f !important;
}

#explanation b,
.choiceExplain b{
  color:#071a2c !important;
}

</style>
</head>
<body>
<header>5択問題アプリ</header>
<main>
<div class="tabs">
<button id="tabQuiz" class="active" onclick="showTab('quiz')">出題</button>
<button id="tabImport" onclick="showTab('importSec')">取込/出力</button>
<button id="tabAdd" onclick="showTab('add')">登録</button>
<button id="tabList" onclick="showTab('list')">一覧</button>
</div>

<section id="quiz" class="card">
<h2>出題</h2>
<label>出題モード</label>
<select id="quizMode" onchange="refreshLinkedFilters(\'quiz\')">
<option value="question">問題単位（4択/5択）</option>
<option value="choice">肢単位（1肢ごと）</option>
</select>
<label>出題対象</label>
<select id="reviewPattern" onchange="refreshLinkedFilters(\'quiz\')">
<option value="all">すべて</option>
<option value="important">重要のみ出題</option>
<option value="x">×のみ出題</option>
<option value="tx">△と×のみ出題</option>
<option value="importantChoice">重要肢のみ出題</option>
</select>
<label>全文検索</label><input id="filterKeyword" placeholder="例：公開会社" oninput="refreshLinkedFilters('quiz')" oninput="refreshLinkedFilters('quiz')">
<div class="filters3">
<div><label>科目区分</label><select id="filterBucket" onchange="refreshLinkedFilters('quiz')"></select></div>
<div><label>問題形式</label><select id="filterProblemFormat" onchange="refreshLinkedFilters('quiz')"></select></div>
<div><label>重要</label><select id="filterImportant" onchange="refreshLinkedFilters('quiz')"></select></div>
</div>
<div class="filters3">
<div><label>年度</label><select id="filterYear" onchange="refreshLinkedFilters('quiz')"></select></div>
<div><label>試験名</label><select id="filterExam" onchange="refreshLinkedFilters('quiz')"></select></div>
<div><label>問</label><select id="filterQuestionNo" onchange="refreshLinkedFilters('quiz')"></select></div>
</div>
<div class="filters3">
<div><label>大分類</label><select id="filterLarge" onchange="refreshLinkedFilters('quiz')"></select></div>
<div><label>中分類</label><select id="filterMiddle" onchange="refreshLinkedFilters('quiz')"></select></div>
<div><label>小分類</label><select id="filterSmall" onchange="refreshLinkedFilters('quiz')"></select></div>
</div>
<div id="filterMatchCount" class="explainBox small">該当問題数：0問</div>
<button onclick="startQuiz()">出題する</button>

<div id="playArea" class="hidden">
<div id="progressCount" class="explainBox small">あと0問</div>
<p class="small" id="metaTitle"></p>

<div id="questionModeArea" class="hidden">
<h2 id="leadText"></h2>
<p class="small" id="answerGuide"></p>
<div id="choices"></div>
<button onclick="judgeQuestionAnswer()">解答する</button>
</div>

<div id="choiceModeArea" class="hidden">
<p class="small">この記述は正しいですか？</p>
<h2 id="choiceTextOnly"></h2>
<div class="filters3">
<button onclick="judgeChoiceAnswer(true)">正しい</button>
<button onclick="judgeChoiceAnswer(false)">誤り</button>
<button class="secondary" onclick="judgeChoiceAnswer(null)">わからない</button>
</div>
</div>

<div id="result" class="result"></div>
<div id="explanation" class="explainBox hidden"></div>
<div id="choiceRecordArea" class="explainBox hidden"></div>

<label>この問題の記録</label>
<div class="markBtns">
<button onclick="setQuestionRecord('○')" id="markO">○</button>
<button onclick="setQuestionRecord('△')" id="markT">△</button>
<button onclick="setQuestionRecord('×')" id="markX">×</button>
<button onclick="setQuestionRecord('')" id="markNone">未設定</button>
</div>

<button class="secondary" id="inlineImportantBtn" onclick="toggleCurrentImportant()">重要にする</button>
<button class="secondary" onclick="editCurrentQuestion()">この問題を編集する</button>
<button class="secondary" onclick="previousQuestionInSession()">前の問題</button>
<button onclick="skipQuestion()">この問題をスキップする</button>
<button class="secondary" onclick="finishLearning()">学習終了</button>
<button onclick="nextQuestionInSession()">次を出題</button>
</div>
</section>

<section id="importSec" class="card hidden">
<h2>Excelインポート / CSVエクスポート</h2>
<label>取り込み先の科目区分</label><select id="importBucket"></select>
<label>取り込み方法</label>
<select id="importMode"><option value="append">既存データを上書きせずに追加</option><option value="overwrite">選択した科目区分を上書き</option></select>
<input type="file" id="excelFile" accept=".xlsx,.xls,.csv">
<button onclick="importExcel()">Excel/CSVを読み込む</button>
<label>CSVエクスポート対象の科目区分（複数選択可）</label>
<select id="exportBuckets" multiple></select>
<p class="small">未選択の場合は全科目区分を出力します。複数選択は Ctrl キー（Macは Command）を押しながら選択してください。</p>
<button class="secondary" onclick="exportCSV()">CSVエクスポート</button>
<button class="danger" onclick="clearAll()">全削除</button>
<p class="small">対応列：問題形式、本文、問題文、選択肢1〜6、選択肢ラベル1〜6、選択肢1解説1〜3、正解ラベル等。6択・肢なし問題にも対応。</p>
</section>

<section id="add" class="card hidden">
<h2>手入力で問題登録・編集</h2>

<label>科目区分</label>
<select id="addBucket"></select>
<label>問題形式</label>
<input id="addProblemFormat" placeholder="例：5択、6択、択一以外">

<div class="filters3">
  <div><label>出題年度</label><input id="addYear" placeholder="例：H19"></div>
  <div><label>試験名</label><input id="addExam" placeholder="例：司法試験"></div>
  <div><label>問</label><input id="addQuestionNo" placeholder="例：問37"></div>
</div>

<div class="filters">
  <div><label>科目</label><input id="addSubject" placeholder="例：商法"></div>
  <div><label>大分類</label><input id="addLarge" placeholder="例：会社"></div>
</div>

<div class="filters">
  <div><label>中分類（任意）</label><input id="addMiddle" placeholder="例：定款 ※空欄可"></div>
  <div><label>小分類</label><input id="addSmall" placeholder="任意"></div>
</div>

<label>タイトル</label>
<input id="addTitle" placeholder="例：H19司法試験問37">

<label><input type="checkbox" id="addImportant" style="width:auto"> 重要問題にする</label>

<label>問題文（リード文）</label>
<textarea id="addLead" placeholder="例：株式会社の定款に関する記述として正しいものを選びなさい。"></textarea>

<h3>選択肢</h3>
<p class="small">4択の場合は5つ目を空欄にしてください。正解は「ア,ウ」「1,3」のように複数指定できます。</p>

<div class="filters">
  <div><label>ラベル1</label><input id="addLabel1" value="ア"></div>
  <div><label>選択肢1</label><input id="addChoice1"></div>
</div>
<textarea id="addExp1" placeholder="選択肢1の解説"></textarea>

<div class="filters">
  <div><label>ラベル2</label><input id="addLabel2" value="イ"></div>
  <div><label>選択肢2</label><input id="addChoice2"></div>
</div>
<textarea id="addExp2" placeholder="選択肢2の解説"></textarea>

<div class="filters">
  <div><label>ラベル3</label><input id="addLabel3" value="ウ"></div>
  <div><label>選択肢3</label><input id="addChoice3"></div>
</div>
<textarea id="addExp3" placeholder="選択肢3の解説"></textarea>

<div class="filters">
  <div><label>ラベル4</label><input id="addLabel4" value="エ"></div>
  <div><label>選択肢4</label><input id="addChoice4"></div>
</div>
<textarea id="addExp4" placeholder="選択肢4の解説"></textarea>

<div class="filters">
  <div><label>ラベル5</label><input id="addLabel5" value="オ"></div>
  <div><label>選択肢5</label><input id="addChoice5"></div>
</div>
<textarea id="addExp5" placeholder="選択肢5の解説"></textarea>

<label>正解ラベル</label>
<input id="addAnswerLabels" placeholder="例：ア または ア,ウ または 1,3">

<label>全体解説</label>
<textarea id="addGeneralExp"></textarea>

<label>問題全体の記録</label>
<select id="addRecord">
  <option value="">未設定</option>
  <option>○</option>
  <option>△</option>
  <option>×</option>
</select>

<button onclick="addManualQuestion()">保存</button>
<button class="secondary" onclick="clearManualForm()">入力欄をクリア</button>
<button class="secondary hidden" id="cancelEditBtn" onclick="cancelEdit()">編集をキャンセル</button>
<button class="secondary" onclick="loadSample()">サンプル問題を追加</button>
</section>

<section id="list" class="card hidden">
<h2>問題一覧</h2>
<label>全文検索</label><input id="listKeyword" oninput="refreshLinkedFilters('list')">
<div class="filters3">
<div><label>科目区分</label><select id="listBucket" onchange="refreshLinkedFilters('list')"></select></div>
<div><label>問題形式</label><select id="listProblemFormat" onchange="refreshLinkedFilters('list')"></select></div>
<div><label>重要</label><select id="listImportant" onchange="refreshLinkedFilters('list')"></select></div>
</div>
<div class="filters3">
<div><label>出題年度</label><select id="listYear" onchange="refreshLinkedFilters('list')"></select></div>
<div><label>試験名</label><select id="listExam" onchange="refreshLinkedFilters('list')"></select></div>
<div><label>問</label><select id="listQuestionNo" onchange="refreshLinkedFilters('list')"></select></div>
</div>
<div class="filters3">
<div><label>大分類</label><select id="listLarge" onchange="refreshLinkedFilters('list')"></select></div>
<div><label>中分類</label><select id="listMiddle" onchange="refreshLinkedFilters('list')"></select></div>
<div><label>小分類</label><select id="listSmall" onchange="refreshLinkedFilters('list')"></select></div>
</div>
<div id="listArea"></div>
</section>
</main>

<script>
const SUBJECT_BUCKETS=["憲法","行政法","民法（総則・物権）","民法（債権・親族・相続）","商法","民事訴訟法","刑法","刑事訴訟法"];
const DB_NAME="quiz_app_stable_rebuild_v1";
const STORE="questions";
let db=null, questions=[], stats={correct:0,wrong:0};
let current=null, currentChoice=null, selectedLabels=[], editingQuestionId="", returnToPracticeAfterEdit=false;
let sessionPool=[], sessionIndex=-1, sessionKey="";

if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js"));}

function openDB(){
 return new Promise((resolve,reject)=>{
  const req=indexedDB.open(DB_NAME,1);
  req.onupgradeneeded=e=>{
   const d=e.target.result;
   if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:"id"});
   if(!d.objectStoreNames.contains("meta"))d.createObjectStore("meta",{keyPath:"key"});
  };
  req.onsuccess=e=>resolve(e.target.result);
  req.onerror=e=>reject(req.error);
 });
}
function store(mode="readonly"){return db.transaction(STORE,mode).objectStore(STORE)}
function meta(mode="readonly"){return db.transaction("meta",mode).objectStore("meta")}
function getAll(){return new Promise((res,rej)=>{const r=store().getAll();r.onsuccess=()=>res(r.result.map(normalize));r.onerror=()=>rej(r.error)})}
function put(q){return new Promise((res,rej)=>{const r=store("readwrite").put(q);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function del(id){return new Promise((res,rej)=>{const r=store("readwrite").delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function clearStore(){return new Promise((res,rej)=>{const r=store("readwrite").clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function getMeta(k){return new Promise((res,rej)=>{const r=meta().get(k);r.onsuccess=()=>res(r.result?r.result.value:null);r.onerror=()=>rej(r.error)})}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function now(){const d=new Date();const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`}
function esc(s){return String(s??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#039;",'"':"&quot;"}[c]))}
function splitLabels(v){return String(v||"").split(/[,\s、，]+/).map(x=>x.trim()).filter(Boolean)}
function truthy(v){return ["○","〇","1","true","yes","重要","★","⭐"].includes(String(v||"").trim().toLowerCase())}
function first(row,names){for(const n of names){if(row[n]!==undefined&&row[n]!==null&&String(row[n]).trim()!=="")return row[n]}return ""}
function exps(row,i){return [row[`選択肢${i}解説1`],row[`選択肢${i}解説2`],row[`選択肢${i}解説3`],row[`選択肢${i}解説`]].filter(v=>v!==undefined&&v!==null&&String(v).trim()!=="").map(String).join("\n")}
function normalize(q){
 const choices=(q.choices2||[]).map((c,i)=>({
  label:String(c.label||String(i+1)), text:String(c.text||""), exp:String(c.exp||""),
  record:c.record||"", importantChoice:!!c.importantChoice, totalCount:Number(c.totalCount||0), correctCount:Number(c.correctCount||0), wrongCount:Number(c.wrongCount||0), lastAnswered:c.lastAnswered||""
 })).filter(c=>c.text);
 return {...q,id:q.id||uid(),subjectBucket:q.subjectBucket||"",problemFormat:q.problemFormat||q.format||"",choices2:choices,answerLabels:(q.answerLabels||[]).map(String),important:!!q.important,record:q.record||"",wrong:!!q.wrong,totalCount:Number(q.totalCount||0),correctCount:Number(q.correctCount||0),wrongCount:Number(q.wrongCount||0)}
}
function makeKey(q){return [q.subjectBucket,q.problemFormat,q.year,q.exam,q.questionNo,q.subject,q.unitLarge,q.unitMiddle,q.unitSmall,q.title].map(v=>String(v||"")).join("||")}
function blob(q){return [q.subjectBucket,q.problemFormat,q.year,q.exam,q.questionNo,q.subject,q.unitLarge,q.unitMiddle,q.unitSmall,q.title,q.q,q.exp,...q.choices2.flatMap(c=>[c.label,c.text,c.exp]),q.answerLabels.join(",")].join(" ").toLowerCase()}
function matchKw(q,kw){kw=String(kw||"").trim().toLowerCase();if(!kw)return true;return kw.split(/\s+/).every(k=>blob(q).includes(k))}
function sameSet(a,b){const A=[...new Set(a.map(String))].sort(),B=[...new Set(b.map(String))].sort();return A.length===B.length&&A.every((v,i)=>v===B[i])}

function filterId(scope, field){
 return scope==="list" ? field.list : field.quiz;
}
function fieldValue(q,key){
 if(key==="important") return q.important ? "1" : "0";
 return String(q[key]||"");
}
function fieldLabel(key,value){
 if(key==="important"){
  if(value==="1") return "重要のみ";
  if(value==="0") return "重要以外";
 }
 return value;
}
function currentFilterValues(scope){
 const result={};
 FILTER_FIELDS.forEach(f=>{
  const el=document.getElementById(filterId(scope,f));
  result[f.key]=el ? el.value : "";
 });
 return result;
}
function problemMatchesValues(q, values, exceptKey=""){
 return FILTER_FIELDS.every(f=>{
  if(f.key===exceptKey) return true;
  const v=values[f.key]||"";
  if(!v) return true;
  return fieldValue(q,f.key)===v;
 });
}
function candidateProblems(scope, exceptKey=""){
 const values=currentFilterValues(scope);
 const keywordEl=document.getElementById(scope==="list" ? "listKeyword" : "filterKeyword");
 const kw=keywordEl ? keywordEl.value : "";
 return questions.filter(q=>problemMatchesValues(q,values,exceptKey)&&matchKw(q,kw));
}
function setFilterOptions(scope, field, currentValue){
 const id=filterId(scope,field);
 const el=document.getElementById(id);
 if(!el) return;
 const rows=candidateProblems(scope, field.key);
 let values=[...new Set(rows.map(q=>fieldValue(q,field.key)).filter(v=>v!==""))].sort();
 if(field.key==="important"){
  // Always only show values that currently exist in filtered rows.
  values=values.sort().reverse();
 }
 el.innerHTML='<option value="">すべて</option>'+values.map(v=>`<option value="${esc(v)}">${esc(fieldLabel(field.key,v))}</option>`).join("");
 el.value=(currentValue&&values.includes(currentValue)) ? currentValue : "";
}

function patternQuestion(q,pat){if(pat==="all")return true;if(pat==="important")return q.important;if(pat==="x")return q.record==="×"||q.wrong;if(pat==="tx")return q.record==="△"||q.record==="×"||q.wrong;if(pat==="importantChoice")return (q.choices2||[]).some(c=>c.importantChoice);return true}
function patternChoice(c,q,pat){if(pat==="all")return true;if(pat==="important")return q.important;if(pat==="x")return c.record==="×"||c.wrongCount>0;if(pat==="tx")return c.record==="△"||c.record==="×"||c.wrongCount>0;if(pat==="importantChoice")return !!c.importantChoice;return true}
function filteredQuestions(pat="all"){
 return selectedProblemsForScope("quiz").filter(q=>patternQuestion(q,pat));
}
function choiceCards(pat="all"){
 const arr=[]; filteredQuestions("all").forEach(q=>q.choices2.forEach(c=>{if(c.text&&patternChoice(c,q,pat))arr.push({qid:q.id,label:c.label})})); return arr
}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

async function startQuiz(){
 const mode=quizMode.value, pat=reviewPattern.value, bucket=filterBucket.value||"ALL"; sessionKey=`session:${bucket}:${mode}:${pat}`;
 const saved=await getMeta(sessionKey);
 if(saved&&saved.pool&&saved.index>=0&&saved.index<saved.pool.length-1&&confirm("前回の続きがあります。続きから始めますか？")){
  sessionPool=saved.pool; sessionIndex=saved.index; return nextQuestionInSession();
 }
 updateFilterMatchCount();
 sessionPool= mode==="choice" ? shuffle(choiceCards(pat)) : shuffle(filteredQuestions(pat).map(q=>q.id));
 sessionIndex=-1; await setMeta(sessionKey,{pool:sessionPool,index:sessionIndex,updatedAt:now()}); nextQuestionInSession();
}
async function nextQuestionInSession(){
 if(!sessionPool.length){alert("条件に合う問題がありません。");return}
 sessionIndex++;
 if(sessionIndex>=sessionPool.length){alert("この条件の問題は終了しました。");return finishLearning(false)}

 updateProgressCount();
 if(quizMode.value==="choice"){const card=sessionPool[sessionIndex]; return showChoiceCard(card.qid,card.label)}
 return showQuestion(sessionPool[sessionIndex])
}

async function previousQuestionInSession(){
 if(!sessionPool || !sessionPool.length){
  alert("前の問題がありません。");
  return;
 }
 if(sessionIndex<=0){
  alert("これより前の問題はありません。");
  updateProgressCount();
  return;
 }
 sessionIndex--;
 await setMeta(sessionKey,{pool:sessionPool,index:sessionIndex,updatedAt:now()});
 updateProgressCount();
 if(quizMode.value==="choice"){
  const card=sessionPool[sessionIndex];
  showChoiceCard(card.qid,card.label);
 }else{
  showQuestion(sessionPool[sessionIndex]);
 }
 scrollToCurrentQuestion();
}

function normalizeLabelToken(s){
 return String(s||"")
  .replace(/肢/g,"")
  .replace(/[，、,\s]/g,"")
  .trim();
}
function splitLabelListText(s){
 return String(s||"")
  .replace(/[及び並びに・]/g,"、")
  .replace(/と/g,"、")
  .replace(/[，,]/g,"、")
  .split("、")
  .map(x=>normalizeLabelToken(x))
  .filter(Boolean);
}
function extractLabelsAfterPhrase(text, phrases){
 const t=String(text||"");
 for(const p of phrases){
  const idx=t.indexOf(p);
  if(idx>=0){
   const after=t.slice(idx+p.length, idx+p.length+40);
   const m=after.match(/[ア-ンA-Za-z0-9１-９一二三四五六七八九〇○、，,・\sと及び並びに]+/);
   if(m) return splitLabelListText(m[0]);
  }
 }
 return [];
}
function inferChoiceTruth(q, choice){
 const label=normalizeLabelToken(choice && choice.label);
 const allText=[q?.exp||"", q?.q||"", q?.title||""].join("\n");

 const falseLabels=extractLabelsAfterPhrase(allText,[
  "誤っている記述は",
  "誤りである記述は",
  "誤っているものは",
  "誤りの記述は",
  "誤りは",
  "誤っているのは"
 ]);
 if(falseLabels.length){
  return !falseLabels.includes(label);
 }

 const trueLabels=extractLabelsAfterPhrase(allText,[
  "正しい記述は",
  "正しいものは",
  "正しいのは",
  "正しい肢は"
 ]);
 if(trueLabels.length){
  return trueLabels.includes(label);
 }

 const cexp=String(choice?.exp||"").trim();
 if(/^(誤り|誤っている|×|✕)/.test(cexp) || /誤り。|誤りです|誤っている/.test(cexp)){
  return false;
 }
 if(/^(正しい|正解|○|〇)/.test(cexp) || /正しい。|正しいです/.test(cexp)){
  return true;
 }

 return (q?.answerLabels||[]).map(x=>normalizeLabelToken(x)).includes(label);
}

 choiceModeArea.classList.add("hidden"); explanation.innerHTML=`<h3>${esc(current.title||"無題")} 肢${esc(currentChoice.label)}</h3><b>${ok?"この肢は正しい記述です。":"この肢は誤りの記述です。"}</b><br>${esc(currentChoice.text)}${currentChoice.exp?`<h3>肢の解説</h3><div class="small">${esc(currentChoice.exp).replace(/\n/g,"<br>")}</div>`:""}${current.exp?`<h3>全体解説</h3><div class="small">${esc(current.exp).replace(/\n/g,"<br>")}</div>`:""}`; explanation.classList.remove("hidden"); renderChoiceRecordArea(current); scrollToExplanation(); await put(current); await reload();
}

 const q={

  })),
  answerLabels,

  totalCount: existing?.totalCount || 0,

 };

 if(!q.q){

 if(q.choices2.length<4){

 if(!q.answerLabels.length){
  alert("正解ラベルを入力してください。");
  return;
 }
 const labels=q.choices2.map(c=>c.label);
 const dup=labels.filter((v,i,a)=>a.indexOf(v)!==i);
 if(dup.length){
  alert("選択肢ラベルが重複しています："+[...new Set(dup)].join(","));
  return;
 }
 const missing=q.answerLabels.filter(a=>!labels.includes(a));
 if(missing.length){
  alert("正解ラベルが選択肢ラベルに存在しません："+missing.join(","));
  return;
 }

 const key=makeKey(q);
 if(!editingQuestionId && questions.some(x=>makeKey(x)===key)){
  if(!confirm("同じ分類・タイトルの問題が既にあります。追加しますか？")) return;
 }

 await put(q);
 await reload();
 alert(editingQuestionId ? "問題を更新しました。" : "問題を保存しました。");
 const shouldReturn=returnToPracticeAfterEdit;
 const editedId=q.id;
 clearManualForm();
 if(shouldReturn){
  returnToPracticeAfterEdit=false;
  await reload();
  const updated=questions.find(x=>x.id===editedId);
  if(updated){
   current=updated;
   showTab("quiz");
   if(currentChoice){
    const updatedChoice=(updated.choices2||[]).find(c=>String(c.label)===String(currentChoice.label));
    if(updatedChoice){
     currentChoice=updatedChoice;
     showChoiceCard(updated.id, updatedChoice.label);
    }else{
     showQuestion(updated.id);
    }
   }else{
    showQuestion(updated.id);
   }
  }else{
   showTab("quiz");
  }
 }else{
  showTab("list");
 }
}

function clearManualForm(){
 editingQuestionId="";
 ["addProblemFormat","addYear","addExam","addQuestionNo","addSubject","addLarge","addMiddle","addSmall","addTitle","addLead","addAnswerLabels","addGeneralExp"].forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.value="";
 });
 for(let i=1;i<=5;i++){
  document.getElementById(`addChoice${i}`).value="";
  document.getElementById(`addExp${i}`).value="";
 }
 ["addLabel1","addLabel2","addLabel3","addLabel4","addLabel5"].forEach((id,i)=>{
  document.getElementById(id).value=["ア","イ","ウ","エ","オ"][i];
 });

}

function cancelEdit(){

}

function editQuestion(id){
 const q=questions.find(x=>x.id===id);
 if(!q){
  alert("編集対象の問題が見つかりません。");
  return;
 }
 editingQuestionId=id;
 showTab("add");
 addBucket.value=q.subjectBucket||"";
 addProblemFormat.value=q.problemFormat||"";
 addYear.value=q.year||"";
 addExam.value=q.exam||"";
 addQuestionNo.value=q.questionNo||"";
 addSubject.value=q.subject||"";
 addLarge.value=q.unitLarge||"";
 addMiddle.value=q.unitMiddle||"";
 addSmall.value=q.unitSmall||"";
 addTitle.value=q.title||"";
 addImportant.checked=!!q.important;
 addLead.value=q.q||"";
 addAnswerLabels.value=(q.answerLabels||[]).join(",");
 addGeneralExp.value=q.exp||"";
 addRecord.value=q.record||"";

 for(let i=1;i<=5;i++){
  const c=(q.choices2||[])[i-1]||{};
  document.getElementById(`addLabel${i}`).value=c.label||["ア","イ","ウ","エ","オ"][i-1];
  document.getElementById(`addChoice${i}`).value=c.text||"";
  document.getElementById(`addExp${i}`).value=c.exp||"";
 }

 if(saveBtn) saveBtn.textContent="更新";
 if(document.getElementById("cancelEditBtn")) cancelEditBtn.classList.remove("hidden");
 window.scrollTo({top:0,behavior:"smooth"});
}

async function importExcel(){
 if(typeof XLSX==="undefined"){alert("Excel読込ライブラリを読み込めません。ネット接続後に再度お試しください。");return}
 const file=excelFile.files[0];
 if(!file){alert("ファイルを選択してください。");return}
 const bucket=importBucket.value;
 if(importMode.value==="overwrite"){
  const targets=questions.filter(q=>q.subjectBucket===bucket);
  if(targets.length&&!confirm(bucket+"の既存データを削除します。よろしいですか？"))return;
  for(const q of targets)await del(q.id);
  await reload();
 }
 const reader=new FileReader();
 reader.onload=async e=>{
  const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});

  // Sheet1を優先。ただし、本文と選択肢列があるシートを見つけた場合はそのシートを採用。
  let sheetName=wb.SheetNames.includes("Sheet1")?"Sheet1":wb.SheetNames[0];
  for(const sn of wb.SheetNames){
   const preview=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:"",header:1,range:0});
   const header=(preview[0]||[]).map(String);
   if((header.includes("本文")||header.includes("問題文")) && (header.includes("選択肢1")||header.includes("問題形式")||header.includes("問題形式モンダイケイシキ"))){
    sheetName=sn;
    break;
   }
  }

  const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:""});
  const keys=new Set(questions.map(makeKey));
  let count=0,skip=0,invalid=0;

  for(const row of rows){
   const ch=[];
   // 新形式：選択肢1〜6まで対応。空欄の選択肢は無視。
   for(let i=1;i<=6;i++){
    const text=String(first(row,[`選択肢${i}`,`肢${i}`,`選択肢${i}本文`,`${i}`])).trim();
    const label=String(first(row,[`選択肢ラベル${i}`,`選択肢ラベル${i}センタクシ`,`選択肢${i}ラベル`,`${i}ラベル`])).trim();
    if(text){
     ch.push({
      label:label||String(i),
      text,
      exp:exps(row,i),
      record:"",
      totalCount:0,
      correctCount:0,
      wrongCount:0,
      lastAnswered:""
     });
    }
   }

   const problemFormat=String(first(row,["問題形式","問題形式モンダイケイシキ","形式"])).trim();
   const q={
    id:uid(),
    subjectBucket:first(row,["科目区分"])||bucket,
    year:first(row,["出題年度","年度"]),
    exam:first(row,["試験名"]),
    questionNo:String(first(row,["問","問題番号"])),
    subject:first(row,["科目"]),
    unitLarge:first(row,["大分類"]),
    unitMiddle:first(row,["中分類"]),
    unitSmall:first(row,["小分類"]),
    important:truthy(first(row,["重要"])),
    problemFormat,
    title:first(row,["タイトル"]),
    q:first(row,["本文","問題文","リード文"]),
    choices2:ch,
    answerLabels:splitLabels(first(row,["正解ラベル","正解ラベルセイカイ","正解"])),
    exp:first(row,["全体解説","解説"]),
    record:"",
    wrong:false,
    totalCount:0,
    correctCount:0,
    wrongCount:0,
    lastAnswered:""
   };

   // 6択や択一でない問題も取り込むため、必須条件は「本文またはタイトルがあること」のみに緩和。
   // 選択肢が0件でも取り込み可。選択肢がある場合も、正解ラベルが選択肢ラベルと一致しない形式を許容。
   if(!(q.q||q.title)){
    invalid++;
    continue;
   }

   const k=makeKey(q);
   if(keys.has(k)){
    skip++;
    continue;
   }
   await put(q);
   keys.add(k);
   count++;
  }
  await reload();
  alert(`${bucket}に${count}問読み込みました。スキップ${skip}問、不備${invalid}問。`);
 };
 reader.readAsArrayBuffer(file);
}

function selectedExportBuckets(){
 const sel=document.getElementById("exportBuckets");
 if(!sel)return [];
 return Array.from(sel.selectedOptions).map(o=>o.value).filter(Boolean);
}
function exportCSV(){
 const buckets=selectedExportBuckets();
 const target=questions.filter(q=>!buckets.length || buckets.includes(q.subjectBucket));
 const maxChoices=Math.max(6,...target.map(q=>(q.choices2||[]).length));
 const header=["科目区分","問題形式","出題年度","試験名","問","科目","大分類","中分類","小分類","重要","タイトル","本文","正解ラベル","全体解説","問題記録","問題総解答回数","問題正答回数","問題誤答回数","問題最終解答日","復習対象"];
 for(let i=1;i<=maxChoices;i++){
  header.push(`選択肢ラベル${i}`,`選択肢${i}`,`選択肢${i}解説`,`選択肢${i}記録`,`選択肢${i}総解答回数`,`選択肢${i}正答回数`,`選択肢${i}誤答回数`,`選択肢${i}最終解答日`);
 }
 const rows=target.map(q=>{
  const row=[
   q.subjectBucket||"",
   q.problemFormat||"",
   q.year||"",
   q.exam||"",
   q.questionNo||"",
   q.subject||"",
   q.unitLarge||"",
   q.unitMiddle||"",
   q.unitSmall||"",
   q.important?"○":"",
   q.title||"",
   q.q||"",
   (q.answerLabels||[]).join(","),
   q.exp||"",
   q.record||"",
   q.totalCount||0,
   q.correctCount||0,
   q.wrongCount||0,
   q.lastAnswered||"",
   q.wrong?"1":""
  ];
  for(let i=0;i<maxChoices;i++){
   const c=(q.choices2||[])[i]||{};
   row.push(c.label||"",c.text||"",c.exp||"",c.record||"",c.totalCount||0,c.correctCount||0,c.wrongCount||0,c.lastAnswered||"");
  }
  return row;
 });
 const csv=[header,...rows].map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
 const suffix=buckets.length?buckets.join("_"):"all";
 const a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}));
 a.download=`quiz_export_${suffix}.csv`;
 a.click();
 URL.revokeObjectURL(a.href);
}
